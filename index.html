    <title>Unity Web Player | Hollow Knight SilkSong</title>
    <link
      rel="shortcut icon"
      href="https://cdn.jsdelivr.net/gh/SomeRandomFella/silkyboy@main/TemplateData/favicon.ico"

      rel="stylesheet"

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      const SILKYBOY_BASE =
        "https://cdn.jsdelivr.net/gh/SomeRandomFella/silkyboy@main/";
      const JSDELIVR_BASE =
        "https://cdn.jsdelivr.net/gh/SomeRandomFella/silkybundles@main/bundles-split/";
      const MANIFEST_URL =
        "https://cdn.jsdelivr.net/gh/SomeRandomFella/silkybundles@main/split-manifest.json";

      const BUNDLE_PATTERN = /StreamingAssets\/aa\/WebGL\/([^?#]+\.bundle)/;

      let _manifestPromise = null;
      function getManifest() {
        if (!_manifestPromise) {
          _manifestPromise = fetch(MANIFEST_URL).then((r) => {
            if (!r.ok) throw new Error("Failed to load manifest: " + r.status);
            return r.json();
          });
        }
        return _manifestPromise;
      }

      async function fetchBundleBytes(filename, onProgress) {
        const manifest = await getManifest();
        const info = manifest[filename];

        if (!info) {
          console.warn(
            "[BundleLoader] Not in manifest, trying direct fetch:",
            filename,
          );
          const res = await window._originalFetch(
            SILKYBOY_BASE + "StreamingAssets/aa/WebGL/" + filename,
          );
          if (!res.ok) throw new Error("Direct fetch failed: " + res.status);
          return new Uint8Array(await res.arrayBuffer());
        }

        if (!info.split) {
          const url =
            JSDELIVR_BASE + encodeURIComponent(filename).replace(/%2F/g, "/");
          const res = await window._originalFetch(url);
          if (!res.ok)
            throw new Error(
              "jsDelivr fetch failed for " + filename + ": " + res.status,
            );
          const buf = await res.arrayBuffer();
          if (onProgress)
            onProgress({
              type: "load",
              total: buf.byteLength,
              loaded: buf.byteLength,
              lengthComputable: true,
            });
          return new Uint8Array(buf);
        }

        const total = info.size;
        let loaded = 0;

        const chunkBuffers = await Promise.all(
          info.chunks.map(async (chunkName) => {
            const url =
              JSDELIVR_BASE +
              encodeURIComponent(chunkName).replace(/%2F/g, "/");
            const res = await window._originalFetch(url);
            if (!res.ok)
              throw new Error(
                "Chunk fetch failed: " + chunkName + " — " + res.status,
              );
            const buf = await res.arrayBuffer();
            loaded += buf.byteLength;
            if (onProgress)
              onProgress({
                type: "progress",
                total,
                loaded,
                lengthComputable: true,
              });
            return new Uint8Array(buf);
          }),
        );

        const merged = new Uint8Array(total);
        let offset = 0;
        for (const chunk of chunkBuffers) {
          merged.set(chunk, offset);
          offset += chunk.length;
        }

        if (onProgress)
          onProgress({
            type: "load",
            total,
            loaded: total,
            lengthComputable: true,
          });
        return merged;
      }

      // ── Intercept fetch ────────────────────────────────────────────────────

      window._originalFetch = window.fetch.bind(window);

      window.fetch = async function (input, init) {
        const url = typeof input === "string" ? input : input && input.url;
        const match = url && url.match(BUNDLE_PATTERN);

        if (!match) {
          return window._originalFetch(input, init);
        }

        const filename = decodeURIComponent(match[1]);
        const onProgress = init && init.onProgress ? init.onProgress : null;

        console.log("[BundleLoader fetch] →", filename);

        try {
          const bytes = await fetchBundleBytes(filename, onProgress);
          console.log(
            "[BundleLoader fetch] ✅",
            filename,
            (bytes.byteLength / 1024 / 1024).toFixed(2) + " MB",
          );

          // Build a real Response object that Unity's internal handlers can consume
          const blob = new Blob([bytes], { type: "application/octet-stream" });
          const response = new Response(blob, {
            status: 200,
            statusText: "OK",
            headers: {
              "Content-Type": "application/octet-stream",
              "Content-Length": String(bytes.byteLength),
            },
          });
          Object.defineProperty(response, "url", { value: url });
          return response;
        } catch (err) {
          console.error(
            "[BundleLoader fetch] ❌ Failed, falling back to direct:",
            filename,
            err,
          );
          return window._originalFetch(input, init);
        }
      };

      // ── Intercept XMLHttpRequest (Unity's UnityWebRequest uses this) ───────

      const _XHROpen = XMLHttpRequest.prototype.open;
      const _XHRSend = XMLHttpRequest.prototype.send;

      XMLHttpRequest.prototype.open = function (method, url, ...rest) {
        this._interceptUrl = url;
        this._interceptMethod = method;
        return _XHROpen.call(this, method, url, ...rest);
      };

      XMLHttpRequest.prototype.send = function (body) {
        const url = this._interceptUrl || "";
        const match = url.match(BUNDLE_PATTERN);

        if (!match) {
          return _XHRSend.call(this, body);
        }

        const filename = decodeURIComponent(match[1]);
        const xhr = this;

        console.log("[BundleLoader XHR] →", filename);

        fetchBundleBytes(filename, function (e) {
          try {
            const evt = new ProgressEvent("progress", {
              lengthComputable: e.lengthComputable,
              loaded: e.loaded,
              total: e.total,
            });
            xhr.dispatchEvent(evt);
          } catch (_) {}
        })
          .then(function (bytes) {
            console.log(
              "[BundleLoader XHR] ✅",
              filename,
              (bytes.byteLength / 1024 / 1024).toFixed(2) + " MB",
            );

            // Overwrite read-only XHR properties so Unity sees a successful response
            Object.defineProperty(xhr, "readyState", {
              configurable: true,
              get: function () {
                return 4;
              },
            });
            Object.defineProperty(xhr, "status", {
              configurable: true,
              get: function () {
                return 200;
              },
            });
            Object.defineProperty(xhr, "statusText", {
              configurable: true,
              get: function () {
                return "OK";
              },
            });
            Object.defineProperty(xhr, "response", {
              configurable: true,
              get: function () {
                return bytes.buffer.slice(
                  bytes.byteOffset,
                  bytes.byteOffset + bytes.byteLength,
                );
              },
            });
            Object.defineProperty(xhr, "responseType", {
              configurable: true,
              get: function () {
                return "arraybuffer";
              },
            });

            // Fire readystatechange events for states 2, 3, 4
            [2, 3, 4].forEach(function (state) {
              try {
                if (state < 4) {
                  // Temporarily report intermediate states via event
                  const evt = new Event("readystatechange");
                  Object.defineProperty(xhr, "readyState", {
                    configurable: true,
                    get: function () {
                      return state;
                    },
                  });
                  if (xhr.onreadystatechange) xhr.onreadystatechange(evt);
                  xhr.dispatchEvent(evt);
                }
              } catch (_) {}
            });

            // Reset to final state 4
            Object.defineProperty(xhr, "readyState", {
              configurable: true,
              get: function () {
                return 4;
              },
            });

            try {
              const loadEvt = new ProgressEvent("load", {
                lengthComputable: true,
                loaded: bytes.byteLength,
                total: bytes.byteLength,
              });
              if (xhr.onload) xhr.onload(loadEvt);
              xhr.dispatchEvent(loadEvt);
            } catch (_) {}

            try {
              const rscEvt = new Event("readystatechange");
              if (xhr.onreadystatechange) xhr.onreadystatechange(rscEvt);
              xhr.dispatchEvent(rscEvt);
            } catch (_) {}

            try {
              const loadendEvt = new ProgressEvent("loadend", {
                lengthComputable: true,
                loaded: bytes.byteLength,
                total: bytes.byteLength,
              });
              if (xhr.onloadend) xhr.onloadend(loadendEvt);
              xhr.dispatchEvent(loadendEvt);
            } catch (_) {}
          })
          .catch(function (err) {
            console.error(
              "[BundleLoader XHR] ❌ Failed, falling back to direct:",
              filename,
              err,
            );
            // Re-open and send the original request so Unity gets a real response
            // (will be a 404, but at least won't crash on undefined)
            try {
              _XHROpen.call(xhr, xhr._interceptMethod || "GET", url, true);
              _XHRSend.call(xhr, body);
            } catch (e2) {
              console.error("[BundleLoader XHR] Fallback also failed:", e2);
            }
          });
      };

      // ── Unity boilerplate ──────────────────────────────────────────────────

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length
            ? "block"
            : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") {
          div.style = "background: red; padding: 10px;";
        } else {
          if (type == "warning")
            div.style = "background: yellow; padding: 10px;";
          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = SILKYBOY_BASE + "Build";
      var loaderUrl = buildUrl + "/w-pt.loader.js";

      var config = {
        arguments: [],
        dataUrl: buildUrl + "/w-pt.data.unityweb",
        frameworkUrl: buildUrl + "/w-pt.framework.js.unityweb",
        codeUrl: buildUrl + "/w-pt.wasm.unityweb",
        streamingAssetsUrl: SILKYBOY_BASE + "StreamingAssets",
        companyName: "EDUrocks Group, Truffled, GN-Math",
        productName: "Hollow Knight SilkSong",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content =
          "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        })
          .then(() => {
            loadingBar.style.display = "none";
          })
          .catch((message) => {
            alert(message);
          });
      };

      document.body.appendChild(script);
    </script>
  </body>

      // Matches any request for a .bundle inside the WebGL streaming assets path
      const BUNDLE_PATTERN = /\/StreamingAssets\/aa\/WebGL\/([^?#]+\.bundle)/;

      // ── Manifest loader (fetched once, then cached) ──────────────────────────
      let _manifestPromise = null;
      function getManifest() {

        if (!info) {

          console.warn(

          );

            JSDELIVR_BASE + encodeURIComponent(filename).replace(/%2F/g, "/");
          const res = await window._originalFetch(url);
          if (!res.ok)
            throw new Error(
              "jsDelivr fetch failed for " + filename + ": " + res.status,
            );

          if (onProgress)
            onProgress({
              type: "load",
              total: buf.byteLength,
              loaded: buf.byteLength,
              lengthComputable: true,
            });
          return new Uint8Array(buf);
        }

        // Split file — fetch all chunks in parallel then concatenate
        const total = info.size;
        let loaded = 0;

        const chunkBuffers = await Promise.all(
          info.chunks.map(async (chunkName) => {
            const url =
              JSDELIVR_BASE +
              encodeURIComponent(chunkName).replace(/%2F/g, "/");
            const res = await window._originalFetch(url);
            if (!res.ok)
              throw new Error(
                "Chunk fetch failed: " + chunkName + " — " + res.status,
              );
            const buf = await res.arrayBuffer();
            loaded += buf.byteLength;
            if (onProgress)
              onProgress({
                type: "progress",
                total,
                loaded,
                lengthComputable: true,
              });

          }),

        // Stitch all chunks together into one contiguous buffer
        const merged = new Uint8Array(total);
        let offset = 0;
        for (const chunk of chunkBuffers) {
          merged.set(chunk, offset);
          offset += chunk.length;
        }

        if (onProgress)
          onProgress({
            type: "load",
            total,
            loaded: total,
            lengthComputable: true,
          });
        return merged;

      // then falls back to arrayBuffer(). We set body=null to force the

      function makeFakeResponse(bytes, url) {
        return {
          ok: true,
          status: 200,
          url,
          parsedBody: bytes,
          body: null, // forces Unity to use arrayBuffer() path
          headers: {
            get(name) {
              switch (name.toLowerCase()) {
                case "content-length":
                  return String(bytes.byteLength);
                case "content-encoding":
                  return null;
                case "last-modified":
                  return null;
                case "etag":
                  return null;
                default:
                  return null;
              }
            },
          },
          arrayBuffer: () =>
            Promise.resolve(
              bytes.buffer.slice(
                bytes.byteOffset,
                bytes.byteOffset + bytes.byteLength,
              ),
            ),
        };
      }

      // ── Save original fetch before patching ──────────────────────────────────
      // We need the real fetch available for non-bundle requests AND for
      // fetching the chunks themselves from jsDelivr (avoid infinite recursion).
      window._originalFetch = window.fetch.bind(window);

      // ── Patch window.fetch ───────────────────────────────────────────────────
      window.fetch = async function (input, init) {
        const url = typeof input === "string" ? input : input && input.url;
        const match = url && url.match(BUNDLE_PATTERN);

        if (!match) {
          // Not a bundle request — completely unchanged behaviour
          return window._originalFetch(input, init);
        }

        const filename = decodeURIComponent(match[1]);
        const onProgress = init && init.onProgress ? init.onProgress : null;

        console.log("[BundleLoader] →", filename);

        try {
          const bytes = await fetchBundleBytes(filename, onProgress);
          console.log(
            "[BundleLoader] ✅",
            filename,
            (bytes.byteLength / 1024 / 1024).toFixed(2) + " MB",
          );
          return makeFakeResponse(bytes, url);
        } catch (err) {
          console.error(
            "[BundleLoader] ❌ Failed, falling back to direct fetch:",
            filename,
            err,
          );
          return window._originalFetch(input, init);
        }
      };

      // ── Standard Unity setup ─────────────────────────────────────────────────
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");
